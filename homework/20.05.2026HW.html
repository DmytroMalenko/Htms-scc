<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle {
            width: 250px;
            height: 250px;
            border-radius: 100%;
            border: 5px solid rgb(6 137 139);
            margin: 5px;
            margin-top: 100px;
 
        }
        .line1 {
            width: 5px;
            height: 90px;
            background-color: rgb(6 137 139);
            margin-left: 120px;
            margin-top: 30px;
            transform-origin: bottom center;
            animation: rotate1 10s linear infinite;
        }
        .line2{
            width: 3px;
            height: 110px;
            background-color: rgb(6 137 139) ;
            margin-left: 120px;
            margin-top: -110px;
            transform-origin: bottom center;
            animation: rotate2 4s linear infinite;
        }


        .circle2 {
            width: 20px;
            height: 20px;
            border-radius: 100%;
            background-color: rgb(6 137 139);
            margin: 5px;
            transform-origin: bottom center;
            margin-top: -10px;
            margin-left: 110px;

        }

        @keyframes rotate1{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }

        @keyframes rotate2{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }


        .block{
            display: flex;
            width: 700px;
            height: 250px;
            justify-content: center;
            align-items: center;
        }

        .text1{
            position: absolute;
            transition: 2s;
            color: transparent;
}

        .block1, .block2 {
            width: 200px;
            height: 70px;
            padding: 40px;
            background-color: rgb(135 45 98);
            border: solid 5px rgb(101 17 66);
            transition: 2s;
        }
        .block:hover .left{
            transform: skewY(10deg) translateX(-120px);
        }
        .block:hover .right{
            transform: skewY(-10deg) translateX(120px);
        }

        .block:hover .text1{
            color: black;
        }








    .card {
    width: 700px;
    height: 200px;
    display: flex;
    margin: 20px auto;
    }

.cardtext {
    width: 50%;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    position: relative;
    overflow: hidden;
    background-color: white;
    }

.cardtext h2 {
    position: relative;
    z-index: 2;
    font-size: 18px;
    font-weight: normal;
    }

.cardtext::after {
    content: "";
    position: absolute;
    inset: 0;
    background: black;
    opacity: 0;
    transition: 0.3s;
}

.cardimage {
    width: 50%;
    height: 100%;
    overflow: hidden;
}

.cardimage img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 1s;
}

.card:hover .cardtext::after {
    opacity: 0.5;
}

.card:hover .cardimage img {
    transform: scale(1.2);
}
    </style>
</head>
<body>
            <!-- Task 1-->
    <div class="circle">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="circle2"></div>
        <p></p>
    </div>



    <div>
        <!-- Task 2 -->
        <p></p>
        <div class="block">
            <div class="block1 left"></div>
            <div class="text1"><h1>HELLO</h1></div>
            <div class="block2 right"></div>

        </div>
    </div>




<div>
        <!-- Task 3 -->
<div class="card">
    <div class="cardtext">
        <h2>HELLO, WORLD!</h2>
    </div>

    <div class="cardimage">
        <img src="resurces/image.png" alt="">
    </div>
</div>

<div class="card">
    <div class="cardimage">
        <img src="resurces/image.png" alt="">
    </div>

    <div class="cardtext">
        <h2>HELLO, WORLD!</h2>
    </div>
</div>

<div class="card">
    <div class="cardtext">
        <h2>HELLO, WORLD!</h2>
    </div>

    <div class="cardimage">
        <img src="resurces/image.png" alt="">
    </div>
</div>
</div>
            



</div>
</body>
</html>
