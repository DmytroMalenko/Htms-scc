<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle {
            width: 250px;
            height: 250px;
            border-radius: 100%;
            border: 5px solid rgb(6 137 139);
            margin: 5px;
            margin-top: 100px;
 
        }
        .line1 {
            width: 5px;
            height: 90px;
            background-color: rgb(6 137 139);
            margin-left: 120px;
            margin-top: 30px;
            transform-origin: bottom center;
            animation: rotate1 10s linear infinite;
        }
        .line2{
            width: 3px;
            height: 110px;
            background-color: rgb(6 137 139) ;
            margin-left: 120px;
            margin-top: -110px;
            transform-origin: bottom center;
            animation: rotate2 4s linear infinite;
        }


        .circle2 {
            width: 20px;
            height: 20px;
            border-radius: 100%;
            background-color: rgb(6 137 139);
            margin: 5px;
            transform-origin: bottom center;
            margin-top: -10px;
            margin-left: 110px;

        }

        @keyframes rotate1{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }

        @keyframes rotate2{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }


        .block1 {
            margin: 30px;
            background-color: rgb(135 45 98);
            width: 200px;
            padding: 40px;
            height: 70px;
            border: solid 5px rgb(101 17 66);
        }

        .block2 {
            margin: 0px;
            background-color: rgb(135 45 98);
            width: 200px;
            padding: 40px;
            height: 70px;
            margin-right: 300px;
            margin-top: -188px;
            border: solid 5px rgb(101 17 66);
        }

        .float-right {
            float: right;
        }

        .skew:hover {
            transform: skew(20deg, 20deg);
        }
        .skew1:hover {
            transform: skew(50deg, 30deg);
        }
    </style>
</head>
<body>
            <!-- Task 1-->
    <div class="circle">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="circle2"></div>
        <p></p>
    </div>



    <div>
        <!-- Task 2 -->
        <p></p>
        <div class="block1 skew1"></div>
        <div class="block2 float-right skew"></div>















    </div>












</body>
</html>
