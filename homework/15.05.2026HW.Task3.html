<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            background-color: #923059 ;
            color: white;
            height: 15px;
            padding: 25px;
            margin: 10px;

        }
        .menu {
            background-color: #6e1237 ;
            color: white;
            padding: 15px;
            margin: 10px;
        }
        .aside1{
            background-color: #b65c82;
            width: 150px;
            color: white;
            padding: 20px;
            margin: 10px;
        }
        .aside2{
            background-color: #b65c82;
            width: 150px;
            height: 90px;
            color: white;
            padding: 20px;
            margin: 10px;
        }
        .float-left {
            float: left;
        }
        .float-right {
            float: right;
            writing-mode:vertical-rl;
            text-orientation: upright;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            color: white;
            float: left;
            background-color: #b65c82;
            width: 400px;
            padding: 20px;
            margin: 10px;
        }
        section{
            background-color: #db92af;
            padding: 30px;
            margin-top: 15px;
        }
        .aside3 {
            color: white;
            background-color: #b65c82;
            height: 240px;
            width: 100px;
            margin-top: 10px;
        }
        footer{
            color: white;
            background-color: #6e1237;
            margin: 10px;
            padding: 20px;
            margin-top: 280px;
        }
    </style>


</head>
<body>
    <div>
        <!-- Task 3 -->

        <header><b>HEADER</b></header>
        <div class="menu"><b>MENU</b></div>
        <div class="float-left">
            <div class="aside1"><b>ASIDE 1</b></div>
            <div class="aside2"><b>ASIDE 2</b></div>
        </div>

        <main>
            <b>MAIN CONTENT</b>
            <section><b>SECTION 1</b></section>
            <section><b>SECTION 2</b></section>
        </main>

        <div class="float-right aside3">
            <div><b>ASIDE 3</b></div>
        </div>

        <div>
            <footer><b>FOOTER</b></footer>
        </div>

    </div>
</body>
</html>
