<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="17.06.2026.style.css">
</head>
<body>
    <h3>Inputs</h3>
    <form action="">
        <div>
            <input class="input1" type="text" name="" id="" placeholder="Enter some text">
        </div>

        <div>
            <input class="input2" type="text" name="" id="" placeholder="valid text">
            <span class="mark">✔</span>
        </div>


        <div>
            <input class="input3" type="text" name="" id="" placeholder="invalid text">
            <span class="cross">✖</span>
        </div>

        <br>
        <h3>Check boxes</h3>
    
        <div>
            <input class="checkbox1" type="checkbox" name="" id="">
            <label for="">Subscribe</label>
        </div>

        <div>
            <input class="checkbox2" type="checkbox" name="" id="">
            <label for="">Subscribe</label>
        </div>

        <h3>Radio buttons</h3>
        <div>
            <label for="">Gender:</label>
            <input class="radio" type="radio" name="radio" id="male">
            <label for="">Male</label>
            <input class="radio" type="radio" name="radio" id="female">
            <label for="">Female</label>
        </div>

        <h3>Buttons</h3>
        <div>
            <button class="active">Active</button>
            <button class="hover">Hover</button>
            <button class="danger">Danger</button>
            <button class="hover1">Hover</button>
            <button class="disabled">Disabled</button>

            <button class="plus">+</button>
            <button class="minus">-</button>
        </div>

        <h3>Text area</h3>

        <div>
            <textarea class="textarea" name="" id="" placeholder="Enter some text..."></textarea>
        </div>
    </form>
</body>
</html>
