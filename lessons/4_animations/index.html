<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button-container {
            background-color: rgb(174, 139, 198);
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            width: 100px;
        }

        .link-button {
            color: black;
            text-decoration: none;
            font-family: 'Times New Roman', Times, serif;
        }

        button {
            background-color: indigo;
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            border: none;
            width: 100px;
            margin: 5px auto;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 1em;
            transition: all 0.8s, cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s;
        }

        button:hover {
            background-color: mediumturquoise;
            color: rgb(129, 77, 26);
            transform: scale(105%);
        }

        .example {
            width: 100px;
            height: 100px;
            background-color: black;
            transition: all 0.7s ease 0s;
            margin: 3px;
            transform-origin: top left;
        }

        .translate:hover {
            transform: translate(25px,20px);
        }
        .scale:hover {
            transform: scale(105%);
        }
        .rotate:hover {
            transform: rotate(-60deg);
        }
        .rotateX:hover {
            transform: rotateX(180deg);
        }
        .rotateY:hover {
            transform: rotateY(60deg);
        }
        .rotateZ:hover {
            transform: rotateZ(120deg);
        }
        .skew:hover {
            transform: skew(50deg, 10deg);
        }


        .circle-container {
            width: 400px;
            height: 400px;
            border: black solid 1px;
            background-color: burlywood;
        }


        .circle {
            width: 50px;
            height: 50px;
            border-radius: 100%;
            background-color: gold;
            margin: 5px;
            animation-name: circle-anim;
            animation-duration: 1s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite; 
        }

        @keyframes circle-anim {

            0% {
                transform: translate(0,0);
                background-color: blue;
            }
            25% {
                transform: translate(338px, 0);
                background-color: coral;
            }

            50% {
                transform: translate(338px, 338px);
                background-color: darkcyan;
            }
            75% {
            transform: translate(0,338px);
            background-color: deeppink;
            }
            100% {
            transform: translate(0,0);
            background-color: firebrick;
            }
            
        }
    </style>
</head>
<body>

<div class="circle-container">
    <div class="circle"></div>
</div>

    <div class="example translate"></div>
    <div class="example scale"></div>
    <div class="example rotate"></div>
    <div class="example rotateX"></div>
    <div class="example rotateY"></div>
    <div class="example rotateZ"></div>
    <div class="example skew"></div>






    <p>
        <a target="_blank" href="https://uk.wikipedia.org/wiki/Гіперпосилання">
            Giperlink</a> - it's element of HTML site, what perenapravlyae   
    </p>

    <button>Click</button>

    <div class="button-container">
        <a href="#" class="link-button">Click</a>
    </div>

</body>
</html>
