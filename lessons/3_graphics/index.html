    <style>

        .bg-green {
            background-color: aquamarine;
        }
        .color-red {
            color: red;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: blanchedalmond;
        }
        /*
        img-container {
            text-align: center;
        } */
        img {
            display: block;
            width: 40%;
            height: 200px;
            margin: 5px auto;
            padding: 5px;
            border: ridge black 2px;
            /*
            border-style: groove;
            border-color: black;
            border-width: 2px;
            */
            border-radius: 5px;
            box-shadow: 2px 2px 15px black;
        }

        .circle {
            width: 200px;
            height: 100px;
            /*background-color: goldenrod;*/
            border: solid black 2px;
            background-repeat: repeat;
            background-size: contain;
            background-position: center center;
            box-shadow: -5px -2px 0px brown;
            background-image: url(resources/resurces.code-workspace)
        }

        .gradient {
            height: 200px;
            width: auto;
            /*background: linear-gradient( to right, blue, #ff6734,pink); */
            /*background: linear-gradient(45deg, blue,pink); */
            /*background: linear-gradient( to left, blue,pink); */
            /*background: linear-gradient( to right, blue,pink); 
            background: linear-gradient( to right, blue,pink);
            background:radial-gradient(blue, pink);*/

            background: linear-gradient(
                            45deg, 
                            rgba(0,0,255,0.631)
                            #ff67346e,
                            rgba(255,192,203,0.511)),

                        radial-gradient(
                             circle at top left,
                              blue 30%,
                                pink);
                       
            /*background: conic-gradient(red,yellow, blue, red);*/
        }

        iframe{
            width: 100%;
            height: auto;
            border: solid 2px black;
        }
    </style>
</head>
