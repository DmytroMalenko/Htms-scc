<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }
        .flex-container {
            background-color: antiquewhite;
            border: black solid 1px;
            border-radius: 15px;

            margin: 0.3em;
            padding: 0.7em;

            display: flex;
            gap: 5%;
            flex-wrap: wrap;
            /* flex-direction: column; */
            justify-content: flex-start;
        }
        
        img {
            width: 20%; 
            min-width: 100px;
        }

        img:last-child {
            align-self: flex-end;
        }
            
        /*
        img:first-child {
            order: 3;
        }
            

        img:first-child, img:last-child {
            flex-grow: 1;
        }

        img:nth-child(2) {
            flex-grow: 2;
        }
            */

        .flex-grow-container {
            display: flex;
            background-color: antiquewhite;
            border: black solid 1px;
            border-radius: 15px;
        }

        .div-1, .div-2 {
            height: 50px;
        }

        .div-1 {
            flex-grow: 1;
            background-color: aquamarine;
        }
        .div-2 {
            flex-grow: 2;
            background-color: greenyellow;
        }
        


    </style>
</head>
<body>
    <div class="flex-container">
        <img src="resurces/car.jpg" alt="">
        <img src="resurces/racecar.webp" alt="">
        <div style="display: flex; justify-content: flex-end; width: 50%;">
            <img src="resurces/racecars.png" alt="">
        </div>
    </div>


    <div class="flex-grow-container">
        <div class="div-1">flex-grow: 1;</div>
        <div class="div-2">flex-grow: 2;</div>
        <div class="div-1">flex-grow: 1;</div>
    </div>
    
</body>
</html>
