<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    body {
        font-family: Arial, Helvetica, sans-serif;;
    }
    .container {

        width: 100%;
        padding: 10px;
        margin: 20px auto;
        display: flex;
        border: 1px solid  lightgray;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }
    .border {
        padding: 7px;
        display: flex;
        height: 30px;
        align-items: center;
        border: 1px lightgray solid;
        border-bottom-color: #3c5a9a;
        margin-top: 10px;
    }

    .block {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    .block1 {
        display: flex;
        align-items: center;
    }

    button {
        background-color: #3c5a9a;
        color: white;
        border: none;
        width: 150px;
        height: 35px;
        margin-left: 10px;
        padding: 5px;
        margin-top: 10px;
        font-weight: bold;
    }

    h3 {
        display: flex;
        

    }

    .text {
        
        display: flex;
        flex-wrap: wrap;

    }

    .width1 {
        width: 170px;
    }

    .width2 {
        display: flex;
        flex: 1;
        gap: 10px;
        justify-content: flex-end;
        white-space: nowrap;
        align-items: center;
        padding-left: 150px;
    }

    .button-block {
        display: flex;
        width: 100%;
    }

    .computer {
        display: block;
    }

    .mobile {
        display: none;
    }


    @media screen and (max-width: 800px)   {

    .container {
        flex-direction: column;
        max-width: 600px;
        padding: 15px;
    }

    img {
        width: 100%;
        height: auto;
        margin: 0 0 15px 0;
    }

    .block1 {
        display: flex;
        width: 100%;
    }

    .width1 {
        width: 40%;
        border: 1px solid #3c5a9a;
        border-right: none;

    }

    .width2 {
        border: 1px solid #3c5a9a;
        flex: 1;
        padding-left: 40px;
        justify-content: flex-end;
        border-left: none;
    }

    h3,
    .text {
        margin-top: 15px;
    }

    button {
        width: 100%;
        margin: 20px 0 0 0;
    }

    .computer {
        display: none;
    }

    .mobile {
        display: block;
        width: 100%;
        height: 35px;
        margin-top: 20px;
        background-color: #3c5a9a;
        color: white;
        border: none;
        font-weight: bold;
    }
    }
</style>
<body>

    <!-- Task 1 -->
        <div class="container">
            <img style="margin-right: 20px; margin-top: 10px;" src="resurces/loading.png" alt="">
                
            <div class="block">
                <div class="block1">
                    <div class="border width1" style="background-color: #d0d6e2; border-left-color: #3c5a9a;">UPLOADING 40%</div>
                    <div class="border width2" style=" border-right-color: #3c5a9a;">About 23 minutes remaining</div>
                    <button class="computer">DONE</button>
                </div>

                <h3>Title of video</h3>

                <div class="text">
                    *Your video is still uploading. Please keep this page open untilit's done.
                </div>
                
                <button class="mobile">DONE</button>  
            </div>
        </div>    
</body>
</html>
