<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="bg-slate-800">
<div class="gap-5 bg-gradient-to-b from-indigo-950 to-sky-950 mx-auto mt-20 flex flex-col rounded-2xl shadow-olive-950 shadow-2xl p-10 justify-center text-center items-center w-100 ">

<div class="relative w-80 group cursor-pointer">
    <img class="w-full rounded-2xl" src="./images/image-equilibrium.jpg" alt="">
  <div class="absolute inset-0 w-full h-full opacity-0 group-hover:opacity-100 transition duration-300">

    <img  class="w-full h-full rounded-2xl" src="design/Image.jpg" alt="">
      <img class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" src="./images/icon-view.svg" alt="">
    </div>
</div>

  <div class="flex flex-col items-start text-left gap-5">
    <div class="text-white font-bold text-2xl hover:text-cyan-300">Equilibrium #3429</div>
    <div class="text-gray-400 text-xl">Our Equilibrium collection promotes balance and calm.</div>
</div>


  <div class="flex justify-between items-center w-full mt-5">

    <div class="flex items-center gap-2">
      <img src="./images/icon-ethereum.svg" alt="">
      <span class="text-cyan-300 text-xl font-medium">0.041 ETH</span>
    </div>


    <div class="flex items-center gap-2">
      <img src="./images/icon-clock.svg" alt="">
      <span class="text-slate-400 text-lg ">3 days left</span>
    </div>
  </div>

  <hr class="border-0.1 border-slate-600 w-full my-1">



<div class="flex justify-between items-center w-full mt-5">
  <div class="flex items-center gap-3">
    <img class="w-10 h-10  rounded-full border border-white" src="./images/image-avatar.png" alt="">
    <span class="text-slate-400 text-lg">Creation of</span><span class="text-white text-lg hover:text-cyan-300">Jules Wyvern</span>
  </div>
</div>

</div>
</body>
</html>
